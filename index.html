<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Locator System</title>
    <style>
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #1a1d23; 
            color: #e0e0e0; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            padding: 20px; 
            margin: 0;
        }

        .container { 
            background: #242933; 
            padding: 40px; 
            border-radius: 12px; 
            border: 1px solid #333b4d; 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        h2 { 
            text-align: center; 
            color: #4ecdc4;
            font-size: 1.6rem;
            margin-top: 0;
            margin-bottom: 30px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-bottom: 1px solid #333b4d;
            padding-bottom: 15px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            box-sizing: border-box; 
            margin-bottom: 15px; 
            background: #1a1d23; 
            border: 1px solid #444; 
            border-radius: 8px;
            color: #fff;
            font-size: 1rem; 
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #4ecdc4;
            box-shadow: 0 0 0 2px rgba(78, 205, 196, 0.2);
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background: #4ecdc4; 
            color: #1a1d23; 
            border: none; 
            border-radius: 8px;
            font-weight: 700; 
            text-transform: uppercase;
            cursor: pointer; 
            transition: transform 0.1s, background 0.2s;
        }

        button:hover { 
            background: #45b7af; 
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        #results { 
            margin-top: 30px; 
            line-height: 1.6; 
            border-top: 1px solid #333b4d; 
            padding-top: 25px; 
            display: none; 
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #results p { margin: 12px 0; font-size: 0.95rem; color: #b0b0b0; }
        #results span { color: #fff; font-weight: 500; }

        .restriction-high { color: #ff6b6b !important; font-weight: bold; text-shadow: 0 0 8px rgba(255,107,107,0.3); }
        .restriction-none { color: #1dd1a1 !important; font-weight: bold; }
        .restriction-warn { color: #feca57 !important; font-weight: bold; }
        
        strong { 
            color: #4ecdc4; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            margin-right: 10px; 
            display: block;
            margin-bottom: 2px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Archive Search</h2>
    
    <div class="input-group">
        <input type="text" id="searchInput" placeholder="Enter Document Name/ID" onkeypress="if(event.key === 'Enter') searchArchive()">
        <button onclick="searchArchive()">Locate Document</button>
    </div>

    <div id="results">
        <p><strong>Title</strong> <span id="res-title"></span></p>
        <p><strong>Shelf Location</strong> <span id="res-shelf"></span></p>
        <p><strong>Category</strong> <span id="res-cat"></span></p>
        <p><strong>Security Status</strong> <span id="res-stat"></span></p>
    </div>
</div>

<script>
    const archive = [
        { id: "L01", title: "THE ERIE CANAL", shelf: 0, cat: "Library", stat: "NO CONFIDENTIALITY", class: "none" },
        { id: "L02", title: "HOME BELOW HELLS CANYON", shelf: 0, cat: "Library", stat: "NO CONFIDENTIALITY", class: "none" },
        { id: "L03", title: "ON TASTE ON THE SUBLIME AND BEAUTIFUL REFLECTIONS ON THE FRENCH REVOLUTION A LETTER TO A NOBLE LORD", shelf: 0, cat: "Library", stat: "NO CONFIDENTIALITY", class: "none" },
        { id: "M01", title: "LANDING PARTY MANUAL EXTRACTS", shelf: 1, cat: "Military", stat: "NO CONFIDENTIALITY", class: "none" },
        { id: "BFM1", title: "FM 21-30", shelf: 1, cat: "Military", stat: "NO CONFIDENTIALITY", class: "none" },
        { id: "BFM2", title: "FM 21-45", shelf: 1, cat: "Military", stat: "NO CONFIDENTIALITY", class: "none" },
        { id: "BFM3", title: "FM 23-41", shelf: 1, cat: "Military", stat: "NO CONFIDENTIALITY", class: "none" },
        { id: "DOC1", title: "MEDICAL SUPPORT IN JOINT OPERATIONS", shelf: 2, cat: "Military", stat: "NO CONFIDENTIALITY", class: "none" },
        { id: "DOC2", title: "HOTSHOT 1970 A MODIFICATION OF RAIN BY THE PARAMETERS OF CLOUD SEEDING ", shelf: 2, cat: "Military", stat: "NO CONFIDENTIALITY", class: "none" },
        { id: "DOC3", title: "SUBMARINE GEOMORPHOLOGY OF EASTERN ROSS SEA AND SULZBERGER BAY, ANTARCTICA", shelf: 2, cat: "Military", stat: "NO CONFIDENTIALITY", class: "none" },
        { id: "DOC4", title: "TROPICAL CYCLONE EVASION PLANNING", shelf: 2, cat: "Military", stat: "NO CONFIDENTIALITY", class: "none" },
        { id: "DOC5", title: "A DIGEST OF THE INTERPRETATION OF METEOROLOGICAL SATELLITE DATA", shelf: 2, cat: "Military", stat: "EXPORT RESTRICTIONS", class: "warn" },
        { id: "RCC1", title: "NAVY TRAINING COURSE", shelf: 3, cat: "Military", stat: "RESTRICTED / CONFIDENTIAL", class: "high" },
        { id: "RCC2", title: "FM 30-10", shelf: 3, cat: "Military", stat: "RESTRICTED / CONFIDENTIAL", class: "high" },
        { id: "RCC3", title: "FM 30-20", shelf: 3, cat: "Military", stat: "RESTRICTED / CONFIDENTIAL", class: "high" },
        { id: "BT1", title: "FIELD ARTILLERY - MILITARY FUNDAMENTALS", shelf: 4, cat: "Military", stat: "NO CONFIDENTIALITY", class: "none" },
        { id: "BT2", title: "OUTLINE OF PROCEDURE FOR TRIALS BEFORE COURTS MARTIAL", shelf: 4, cat: "Military", stat: "NO CONFIDENTIALITY", class: "none" },
        { id: "COOLMUSEUMBRO", title: "I AGREE!", shelf: 69, cat: "Easter Egg", stat: "420", class: "high"}
    ];

    function searchArchive() {
        const input = document.getElementById('searchInput').value.toUpperCase().trim();
        const resultDiv = document.getElementById('results');

        if (input === "") {
            resultDiv.style.display = 'none';
            return;
        }

        const doc = archive.find(item => 
            item.id.toUpperCase() === input || 
            item.title.toUpperCase() === input
        );

        if (doc) {
            resultDiv.style.display = 'block';
            document.getElementById('res-title').innerText = doc.title;
            document.getElementById('res-shelf').innerText = doc.shelf;
            document.getElementById('res-cat').innerText = doc.cat;
            document.getElementById('res-stat').innerText = doc.stat;
            document.getElementById('res-stat').className = 'restriction-' + doc.class;
        } else {
            alert("MATCH NOT FOUND - HAVE YOU CHECKED YOUR DUSTANDGLORYIDS.TXT FILE?");
            resultDiv.style.display = 'none';
        }
    }
</script>
</html>
